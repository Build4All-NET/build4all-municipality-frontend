name: baladiyati
description: Municipality Digital App — بلديتي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3

  # HTTP & API
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Equality
  equatable: ^2.0.5

  # JWT decode
  jwt_decoder: ^2.0.1

  cupertino_icons: ^1.0.2
  dartz: ^0.10.1
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  generate: true
  uses-material-design: true
  
  

