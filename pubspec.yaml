name: baladiyati
description: Municipality Digital App — بلديتي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3

  # HTTP & API
  http: ^1.1.0
  dio: ^5.9.2

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Utils
  equatable: ^2.0.5
  jwt_decoder: ^2.0.1
  dartz: ^0.10.1
  connectivity_plus: ^6.0.3

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  generate: true
  uses-material-design: true