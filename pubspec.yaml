name: baladiyati
description: Municipality Digital App — بلديتي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  # State Management
  flutter_bloc: ^8.1.3

  # HTTP & API
  http: ^1.1.0
  dio: ^5.9.2

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

  # Utils
  equatable: ^2.0.5
  jwt_decoder: ^2.0.1
  dartz: ^0.10.1
  connectivity_plus: ^6.0.3

  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter_icons:
  android: true
  ios: true
  image_path: assets/branding/logo.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/logo.png
  android: true
  ios: true

  android_12:
    color: "#FFFFFF"
    image: assets/branding/logo.png

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/branding/
  